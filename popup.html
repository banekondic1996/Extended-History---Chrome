<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Extended History</title>
<style>
:root { --accent:#3b9eff; --accent2:#2dd4a0; }
[data-theme="dark"]  { --bg:#131318; --s1:#18181f; --s2:#1f1f28; --border:rgba(255,255,255,0.08); --text:#f0eee8; --text2:#a09eb0; --text3:#5a5870; }
[data-theme="light"] { --bg:#ffffff; --s1:#f5f5f7; --s2:#eeeef2; --border:rgba(0,0,0,0.08); --text:#111118; --text2:#555568; --text3:#aaaabc; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,'Segoe UI',sans-serif; width:340px; font-size:13px; position:relative; }
.header { display:flex; align-items:center; gap:8px; padding:12px 14px 10px; border-bottom:1px solid var(--border); }
.hico { width:26px;height:26px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:6px; display:flex;align-items:center;justify-content:center; font-size:13px; }
.htitle { font-weight:600; font-size:0.9rem; flex:1; }
.open-btn { padding:5px 11px; background:var(--accent); border:none; border-radius:6px; color:#fff; font-size:0.75rem; font-weight:600; cursor:pointer; }
.tabs { display:flex; gap:4px; padding:8px 14px; background:var(--bg); border-bottom:1px solid var(--border); transition:opacity 0.2s, transform 0.2s; }
.tabs.hidden { opacity:0; transform:scaleY(0); height:0; overflow:hidden; padding:0; border:none; }
.tab { flex:1; padding:6px 8px; background:transparent; border:none; border-radius:6px; color:var(--text2); font-size:0.75rem; font-weight:500; cursor:pointer; transition:color 0.15s; text-align:center; }
.tab:hover { background:var(--s1); color:var(--text); }
.tab.active { background:var(--s1); color:var(--accent); font-weight:600; }
.content-wrapper { position:relative; }
.content { max-height:320px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--s2) transparent; }
.content::-webkit-scrollbar { width:6px; }
.content::-webkit-scrollbar-track { background:transparent; }
.content::-webkit-scrollbar-thumb { background:var(--s2); border-radius:3px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.ritem { display:flex; align-items:center; gap:9px; padding:8px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.08s; text-decoration:none; color:inherit; }
.ritem:hover { background:var(--s1); }
.rfav { width:14px;height:14px;border-radius:3px;flex-shrink:0; }
.rbody { flex:1; min-width:0; }
.rtitle { font-size:0.8rem; color:var(--text); white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.rtime  { font-size:0.65rem; color:var(--text3); flex-shrink:0; font-family:monospace; }
.loading { padding:18px 14px; color:var(--text3); font-size:0.8rem; text-align:center; }
.empty { padding:18px 14px; color:var(--text3); font-size:0.8rem; text-align:center; }
.search-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:var(--bg); z-index:100; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); visibility:hidden; }
.search-overlay.active { transform:translateX(0); visibility:visible; }
.search-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.search-title { font-size:0.8rem; font-weight:600; color:var(--text2); }
.search-list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--s2) transparent; max-height:320px; }
.search-list::-webkit-scrollbar { width:6px; }
.search-list::-webkit-scrollbar-track { background:transparent; }
.search-list::-webkit-scrollbar-thumb { background:var(--s2); border-radius:3px; }
.search-bar { padding:8px 14px; background:var(--bg); border-top:1px solid var(--border); position:relative; }
.search-input { width:100%; padding:8px 32px 8px 12px; background:var(--s1); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.8rem; outline:none; transition:border-color 0.15s; }
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--text3); }
.search-clear { position:absolute; right:22px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text3); font-size:1rem; cursor:pointer; padding:4px; display:none; line-height:1; }
.search-clear.visible { display:block; }
.search-clear:hover { color:var(--text); }
.footer { display:flex; gap:0; border-top:1px solid var(--border); position:relative; }
.flink { flex:1; padding:10px 8px; text-align:center; font-size:0.72rem; color:var(--text2); cursor:pointer; border:none; background:none; transition:all 0.1s; }
.flink:hover { background:var(--s1); color:var(--accent); }
.flink + .flink { border-left:1px solid var(--border); }
</style>
</head>
<body>
<div class="header">
  <img src="/icons/icon128.png" class="hico">
  <div class="htitle">Extended History</div>
  <button class="open-btn" id="openBtn">Open</button>
</div>
<div class="tabs" id="tabsRow">
  <button class="tab active" data-tab="history">Recent History</button>
  <button class="tab" data-tab="tabs">Closed Tabs</button>
</div>
<div class="content-wrapper">
  <div class="content" id="mainContent">
    <div class="tab-panel active" id="panel-history">
      <div id="recent"><div class="loading">Loading…</div></div>
    </div>
    <div class="tab-panel" id="panel-tabs">
      <div id="recentTabs"><div class="loading">Loading…</div></div>
    </div>
  </div>
  <div class="search-overlay" id="searchOverlay">
    <div class="search-header">
      <span class="search-title">Search Results</span>
    </div>
    <div class="search-list" id="searchResults">
      <div class="loading">Start typing to search...</div>
    </div>
  </div>
</div>
<div class="footer">
  <button class="flink" data-panel="activity">Activity</button>
  <button class="flink" data-panel="bookmarks">Bookmarks</button>
  <button class="flink" data-panel="sessions">Sessions</button>
  <button class="flink" data-panel="settings">Settings</button>
</div>
<div class="search-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search all history...">
  <button class="search-clear" id="searchClear">✕</button>
</div>
<script src="popup.js"></script>
</body>
</html>
